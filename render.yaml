services:
  - type: web
    name: vinyard-burger-bar
    env: node
    buildCommand: npm install
    preDeployCommand: npm run db:migrate
    startCommand: node server/index.js
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: true
      - key: DB_CA_PATH
        sync: false
      - key: DB_CA_CERT
        sync: false
      - key: DB_CA_CERT_BASE64
        sync: false
      - key: JWT_SECRET
        sync: false
