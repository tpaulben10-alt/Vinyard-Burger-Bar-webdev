<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinyard Burger Bar | Register</title>
    <link rel="stylesheet" href="/css/main.css">
  </head>
  <body>
    <main class="hero-auth">
      <section class="hero-copy">
        <img class="brand-logo large" src="/images/brand/logo.jpg" alt="Vinyard Burger Bar logo">
        <span class="eyebrow">Customer registration</span>
        <h1>Vinyard Burger Bar</h1>
        <p>Create your account for burgers, pasta, rice meals, coffee, and live order updates.</p>
      </section>

      <section class="auth-panel">
        <h2>Create Account</h2>
        <form class="form" data-register-form>
          <label>Full Name
            <input name="name" type="text" autocomplete="name" required>
          </label>
          <label>Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <label>Confirm Password
            <input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required>
          </label>
          <button type="submit">Create Account</button>
        </form>
        <p>Already registered? <a href="/index.html">Log in</a></p>
        <div class="message" data-message></div>
      </section>
    </main>
    <script src="/js/auth.js"></script>
  </body>
</html>
