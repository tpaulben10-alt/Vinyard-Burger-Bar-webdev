<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinyard Burger Bar | Login</title>
    <link rel="stylesheet" href="/css/main.css">
  </head>
  <body>
    <main class="hero-auth">
      <section class="hero-copy">
        <img class="brand-logo large" src="/images/brand/logo.jpg" alt="Vinyard Burger Bar logo">
        <span class="eyebrow">Online ordering and POS</span>
        <h1>Vinyard Burger Bar</h1>
        <p>Where friends and burgers gather. Order from the same warm Vinyard counter, now online.</p>
      </section>

      <section class="auth-panel">
        <h2>Welcome Back</h2>
        <form class="form" data-login-form>
          <label>Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>Password
            <input name="password" type="password" autocomplete="current-password" required>
          </label>
          <button type="submit">Log In</button>
        </form>
        <p>New here? <a href="/register.html">Create a customer account</a></p>
        <div class="message" data-message></div>
      </section>
    </main>
    <script src="/js/auth.js"></script>
  </body>
</html>
