<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinyard POS | Accounts</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
  </head>
  <body data-page="admin-accounts">
    <header class="topbar">
      <h1 class="brand">Vinyard POS</h1>
      <nav class="nav-actions">
        <a class="button secondary" href="/admin/dashboard.html">Dashboard</a>
        <a class="button secondary" href="/admin/orders.html">Orders</a>
        <a class="button secondary" href="/admin/online-users.html">Online</a>
        <button class="ghost" data-logout>Logout</button>
      </nav>
    </header>

    <main class="layout">
      <div class="toolbar">
        <div>
          <span class="eyebrow">Registered accounts</span>
          <h2 class="section-title">Users</h2>
        </div>
        <input data-user-search placeholder="Search name or email">
        <select data-role-filter>
          <option value="all">All roles</option>
          <option value="customer">Customers</option>
          <option value="admin">Admins</option>
        </select>
      </div>
      <section class="table-shell">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Joined</th>
              <th>Last Seen</th>
            </tr>
          </thead>
          <tbody data-users-table></tbody>
        </table>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
