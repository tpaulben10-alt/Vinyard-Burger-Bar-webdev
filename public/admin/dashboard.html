<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinyard POS | Admin</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
  </head>
  <body data-page="admin-dashboard">
    <header class="topbar">
      <a class="brand-lockup" href="/admin/dashboard.html">
        <img class="brand-logo" src="/images/brand/logo.jpg" alt="Vinyard Burger Bar logo">
        <span><span class="brand">Vinyard POS</span><span class="brand-tagline">Burger Bar</span></span>
      </a>
      <nav class="nav-actions">
        <span>Admin: <strong data-admin-name></strong></span>
        <button class="ghost" data-logout>Logout</button>
      </nav>
    </header>

    <main class="layout">
      <span class="eyebrow">Service overview</span>
      <h2 class="section-title">Dashboard</h2>
      <section class="grid summary-grid">
        <article class="card summary-card"><span>Orders Today</span><strong data-total-today>0</strong></article>
        <article class="card summary-card"><span>Pending Orders</span><strong data-pending>0</strong></article>
        <article class="card summary-card"><span>Online Customers</span><strong data-online>0</strong></article>
        <article class="card summary-card"><span>Registered Users</span><strong data-users>0</strong></article>
      </section>

      <section class="grid admin-links" style="margin-top: 1rem;">
        <a class="card admin-link" href="/admin/orders.html"><h3>Orders</h3><span>Manage live POS tickets</span></a>
        <a class="card admin-link" href="/admin/menu.html"><h3>Menu Stock</h3><span>Add items and control inventory</span></a>
        <a class="card admin-link" href="/admin/online-users.html"><h3>Online Users</h3><span>Watch active customers</span></a>
        <a class="card admin-link" href="/admin/accounts.html"><h3>Accounts</h3><span>Browse registered users</span></a>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
