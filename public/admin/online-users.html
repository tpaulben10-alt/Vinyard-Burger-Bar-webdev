<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinyard POS | Online Users</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/admin.css">
  </head>
  <body data-page="admin-online">
    <header class="topbar">
      <a class="brand-lockup" href="/admin/dashboard.html">
        <img class="brand-logo" src="/images/brand/logo.jpg" alt="Vinyard Burger Bar logo">
        <span><span class="brand">Vinyard POS</span><span class="brand-tagline">Burger Bar</span></span>
      </a>
      <nav class="nav-actions">
        <a class="button secondary" href="/admin/dashboard.html">Dashboard</a>
        <a class="button secondary" href="/admin/orders.html">Orders</a>
        <a class="button secondary" href="/admin/accounts.html">Accounts</a>
        <button class="ghost" data-logout>Logout</button>
      </nav>
    </header>

    <main class="layout">
      <span class="eyebrow">Live presence</span>
      <h2 class="section-title">Online Customers</h2>
      <section class="table-shell">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Last Active</th>
            </tr>
          </thead>
          <tbody data-online-table></tbody>
        </table>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/admin.js"></script>
  </body>
</html>
