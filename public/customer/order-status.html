<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vinyard Burger Bar | Order Status</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/customer.css">
  </head>
  <body>
    <header class="topbar">
      <h1 class="brand">Vinyard</h1>
      <nav class="nav-actions">
        <span>Hi, <strong data-user-name></strong></span>
        <a class="button secondary" href="/customer/dashboard.html">Menu</a>
        <button class="ghost" data-logout>Logout</button>
      </nav>
    </header>

    <main class="layout">
      <span class="eyebrow">Live kitchen tracking</span>
      <h2 class="section-title">Your Orders</h2>
      <section class="orders-list" data-orders></section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/order-status.js"></script>
  </body>
</html>
